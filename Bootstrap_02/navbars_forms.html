<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Navbars & Forms</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body class="p-0 m-0">
    <nav class="navbar navbar-expand-lg bg-light mb-5" data-bs-theme="light">
      <div class="container-fluid">
        <!-- Navbar Brand/Logo -->
        <a href="#" class="navbar-brand ms-3">My Site</a>

        <!-- Toggle button -->
        <button
          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="#myNavbar"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Menu -->
        <div class="collapse navbar-collapse" id="myNavbar">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a href="#" class="nav-link">Projects</a>
            </li>

            <li class="nav-item dropdown">
              <a
                href="#"
                class="nav-link dropdown-toggle"
                data-bs-toggle="dropdown"
                data-bs-target="#productsDropdown"
                >Products</a
              >

              <!-- Dropdown menu -->
              <ul class="dropdown-menu" id="productsDropdown">
                <li><a href="#" class="dropdown-item">Premium</a></li>
                <li><a href="#" class="dropdown-item">Freemium</a></li>
                <li><a href="#" class="dropdown-item">Trial Based</a></li>
              </ul>
            </li>

            <li class="nav-item">
              <a href="#" class="nav-link">Contact</a>
            </li>

            <li class="nav-item">
              <a href="#" class="nav-link">Our Team</a>
            </li>

            <li class="nav-item">
              <a href="#" class="nav-link">About</a>
            </li>
          </ul>

          <form class="d-flex">
            <input
              type="search"
              placeholder="Search this site.."
              class="form-control"
            />
          </form>
        </div>
      </div>
    </nav>

    <!-- Forms -->
    <div class="container">
      <form>
        <label for="smth" class="form-label">Username</label>

        <div class="input-group">
          <span class="input-group-text">@</span>
          <input
            type="text"
            placeholder="Enter smth"
            id="smth"
            class="form-control form-control-sm"
          />
        </div>

        <div class="form-check form-switch">
          <input type="checkbox" class="form-check-input" id="ch1" />
          <label for="ch1" class="form-check-label">Check Me</label>
        </div>

        <div class="form-floating">
          <input
            type="text"
            id="myInput"
            placeholder="Enter something"
            class="form-control"
          />
          <label for="myInput">Something</label>
        </div>

        <select name="country" id="country" class="form-select mt-3">
          <option value="">Select Country</option>
          <option value="Pak">Pakistan</option>
          <option value="Ind">India</option>
        </select>
      </form>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
