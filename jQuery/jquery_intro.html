<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Getting started with jQuery</title>

    <script src="https://cdn.jsdelivr.net/npm/jquery@4.0.0/dist/jquery.min.js"></script>

    <script src="jquery_intro.js"></script>

    <style>
      .myHeading {
        text-align: center;
        font-size: 4rem;
        color: purple;
      }

      #loadingIndicator {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        display: none;
        background-color: transparent;
        border-top: 7px solid rgb(105, 13, 180);
        margin-inline: auto;
        animation-name: spin;
        animation-duration: 1s;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
      }

      @keyframes spin {
        from {
          opacity: 0;
          transform: rotate(0deg);
        }
        to {
          opacity: 1;
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <h1 id="demo">Hello World</h1>
    <h1 id="demo2" style="display: none">Hello Web</h1>

    <!-- <button id="btn">Click Me</button> -->

    <button id="getUsersBtn">Get Users</button>

    <div id="loadingIndicator"></div>

    <ul id="usersList"></ul>
  </body>
</html>
