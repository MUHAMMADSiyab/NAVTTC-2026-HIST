<!doctype html>
<html>
  <head>
    <title>HTML Lists</title>
  </head>

  <body>
    <!-- ul = Unordered List -->

    <!-- li = List Item -->

    <ul type="square">
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
      <li>Item 4</li>
    </ul>

    <!-- Ordered List -->

    <ol type="I">
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
      <li>Item 4</li>
    </ol>

    <!-- Nested Lists -->
    <ol>
      <li>
        What is the Capital of Pakistan?

        <ol type="A">
          <li>Karachi</li>
          <li>Quetta</li>
          <li>Islamabad</li>
          <li>Sialkot</li>
        </ol>
      </li>
    </ol>

    <!-- Description List -->
    <dl>
      <dt>Itme 1</dt>
      <dd>Itme 1 Description</dd>
    </dl>
  </body>
</html>
